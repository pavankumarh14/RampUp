services:
  - type: web
    name: rampup
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    buildFilter:
      paths:
        - app/**
        - frontend/**
        - pyproject.toml
        - uv.lock
        - generate_sample_dataset.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rampup-db
          property: connectionString
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_EMBEDDING_PROVIDER
        value: gemini
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-15-preview
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: rampup-db
    databaseName: rampup
    user: rampup
    plan: starter
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Everywhere (development only)
